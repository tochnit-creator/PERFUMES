<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Perfumes — Abril 2026</title>

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --dark: #0E0C0A;
    --dark2: #1A1714;
    --dark3: #252118;
    --cream: #F5EFE4;
    --text-muted: #8A8070;
    --masc: #2A4A6B;
    --masc-light: #4A7FAF;
    --fem: #7B3B5A;
    --fem-light: #C4709A;
    --uni: #2E5E4E;
    --uni-light: #5CA882;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  .hero {
    background: linear-gradient(135deg, #0E0C0A 0%, #1E1A10 50%, #0E0C0A 100%);
    border-bottom: 1px solid var(--gold);
    padding: 60px 40px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-sub {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 8px;
  }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero-date {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 16px;
  }
  .ornament {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin: 20px 0;
  }
  .ornament-line { height: 1px; width: 80px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .ornament-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
  .ornament-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

  /* PRICING LEGEND */
  .pricing-info {
    display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
    padding: 20px 40px;
    background: var(--dark2);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
  }
  .pricing-info span { color: var(--gold); font-weight: 500; }

  /* FILTERS */
  .filters {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,12,10,0.96);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 14px 40px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .filter-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-muted); margin-right: 6px;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--text-muted);
    padding: 6px 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 600;
  }
  .filter-btn.brand-filter { border-color: rgba(255,255,255,0.15); }
  .filter-btn.brand-filter:hover, .filter-btn.brand-filter.active {
    background: var(--cream); border-color: var(--cream); color: var(--dark);
  }
  .search-wrap { margin-left: auto; }
  .search-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--cream);
    padding: 7px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    border-radius: 2px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--gold); }

  /* BRAND SECTIONS */
  .brand-section { padding: 40px 40px 20px; }
  .brand-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--cream);
  }
  .brand-count {
    font-size: 11px; letter-spacing: 2px; color: var(--text-muted);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3px 10px; border-radius: 20px;
  }

  /* PRODUCT GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 22px 20px 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    cursor: default;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    transition: opacity 0.3s;
  }
  .card.masc::before { background: linear-gradient(90deg, var(--masc), var(--masc-light)); }
  .card.fem::before { background: linear-gradient(90deg, var(--fem), var(--fem-light)); }
  .card.uni::before { background: linear-gradient(90deg, var(--uni), var(--uni-light)); }
  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(201,168,76,0.3);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.06);
  }

  /* Gender badge */
  .badge-row {
    display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
  }
  .badge {
    font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px;
  }
  .badge.masc { background: rgba(42,74,107,0.4); color: var(--masc-light); border: 1px solid rgba(42,74,107,0.6); }
  .badge.fem { background: rgba(123,59,90,0.4); color: var(--fem-light); border: 1px solid rgba(123,59,90,0.6); }
  .badge.uni { background: rgba(46,94,78,0.4); color: var(--uni-light); border: 1px solid rgba(46,94,78,0.6); }
  .badge.scent {
    background: rgba(201,168,76,0.1);
    color: var(--gold-light);
    border: 1px solid rgba(201,168,76,0.25);
  }
  .badge.type {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .card-product {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--cream);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-volume {
    font-size: 11px; letter-spacing: 2px; color: var(--text-muted);
    margin-bottom: 16px;
  }

  .price-block { display: flex; gap: 12px; flex-wrap: wrap; }
  .price-item { flex: 1; min-width: 90px; }
  .price-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .price-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600; letter-spacing: 1px;
    color: var(--gold);
  }
  .price-value.bulk { color: var(--cream); font-size: 18px; }
  .price-divider {
    width: 1px; background: rgba(255,255,255,0.08);
    margin: 0 4px; align-self: stretch;
  }


  /* NO PRICE */
  .no-price { color: var(--text-muted); font-size: 12px; letter-spacing: 2px; font-style: italic; }

  /* FOOTER */
  .footer {
    text-align: center; padding: 40px;
    border-top: 1px solid rgba(201,168,76,0.15);
    margin-top: 40px;
    color: var(--text-muted); font-size: 11px; letter-spacing: 2px;
  }
  .footer span { color: var(--gold); }

  /* HIDDEN */
  .card.hidden, .brand-section.hidden { display: none; }
  .brand-section.all-hidden { display: none; }

  /* LEGEND */
  .legend {
    display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
    padding: 16px 40px;
    background: var(--dark2);
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .ld-masc { background: var(--masc-light); }
  .ld-fem { background: var(--fem-light); }
  .ld-uni { background: var(--uni-light); }

  @media (max-width: 600px) {
    .hero { padding: 40px 20px; }
    .brand-section { padding: 30px 16px 16px; }
    .filters { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .search-wrap { width: 100%; }
    .search-input { width: 100%; }
  }
</style>
</head>

function fmt(val) {
  return val.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function buildCatalog() {
  const brands = [...new Set(products.map(p => p.brand))].sort();
  const catalog = document.getElementById('catalog');

  brands.forEach(brand => {
    const brandProds = products.filter(p => p.brand === brand);
    const section = document.createElement('section');
    section.className = 'brand-section';
    section.dataset.brand = brand;

    section.innerHTML = `
      <div class="brand-header">
        <h2 class="brand-name">${brand}</h2>
        <span class="brand-count">${brandProds.length} produtos</span>
      </div>
      <div class="grid" id="grid-${brand.replace(/[^a-zA-Z0-9]/g,'_')}"></div>
    `;
    catalog.appendChild(section);

    const grid = section.querySelector('.grid');
    brandProds.forEach((p, i) => {
      const p1 = p.cost * 2.1;
      const p2 = p.cost * 1.7;
      const genderLabel = p.gender === 'masc' ? 'Masculino' : p.gender === 'fem' ? 'Feminino' : 'Unissex';
      const card = document.createElement('div');
      card.className = `card ${p.gender}`;
      card.dataset.gender = p.gender;
      card.dataset.scent = p.scent;
      card.dataset.search = `${p.brand} ${p.name} ${p.vol} ${p.scent} ${genderLabel}`.toLowerCase();
      card.style.animationDelay = `${i * 30}ms`;

      card.innerHTML = `
        <div class="badge-row">
          <span class="badge ${p.gender}">${genderLabel}</span>
          <span class="badge scent">${p.scent}</span>
          <span class="badge type">${p.type}</span>
        </div>
        <div class="card-product">${p.name}</div>
        <div class="card-volume">${p.vol}</div>
        <div class="price-block">
          <div class="price-item">
            <div class="price-label">1 Unidade</div>
            <div class="price-value">${fmt(p1)}</div>
          </div>
          <div class="price-divider"></div>
          <div class="price-item">
            <div class="price-label">2+ Unidades</div>
            <div class="price-value bulk">${fmt(p2)}</div>
          </div>
        </div>
        
      `;
      grid.appendChild(card);
    });
  });
}

function applyFilters() {
  const activeGender = document.querySelector('[data-filter].active')?.dataset.filter || 'all';
  const activeScent = document.querySelector('[data-scent].active')?.dataset.scent || 'all-scent';
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  document.querySelectorAll('.card').forEach(card => {
    const genderMatch = activeGender === 'all' || card.dataset.gender === activeGender;
    const scentMatch = activeScent === 'all-scent' || card.dataset.scent === activeScent;
    const searchMatch = !search || card.dataset.search.includes(search);
    card.classList.toggle('hidden', !(genderMatch && scentMatch && searchMatch));
  });

  document.querySelectorAll('.brand-section').forEach(section => {
    const visible = section.querySelectorAll('.card:not(.hidden)').length > 0;
    section.classList.toggle('all-hidden', !visible);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildCatalog();

  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
  });

  document.querySelectorAll('[data-scent]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-scent]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
  });

  document.getElementById('searchInput').addEventListener('input', applyFilters);
});
</script>
